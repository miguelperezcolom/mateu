<oj-vb-fragment id="page-header" bridge="[[vbBridge]]" name="page-header">
  <oj-vb-fragment-param name="title" value="Item 3"></oj-vb-fragment-param>
  <template slot="actions">
  </template>
</oj-vb-fragment>
<div class="oj-flex">
  <div class="oj-flex-item oj-sm-12 oj-md-12">
    <oj-bind-if test="[[ ($variables.idpersona) !== undefined ]]">
      <oj-form-layout readonly="true">
        <oj-input-text value="[[ $variables.persona.nombre ]]" readonly="true" label-hint="Nombre"></oj-input-text>
        <oj-input-number value="[[ $variables.persona.edad ]]" readonly="true" label-hint="Edad"></oj-input-number>
      </oj-form-layout>
    </oj-bind-if>
  </div>
</div>
