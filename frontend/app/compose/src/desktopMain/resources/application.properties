# Backend base URL of a running Mateu app (e.g. a demo or e2e SUT)
mateu.baseUrl=http://localhost:8592
# Initial route to load ("/" = root)
mateu.route=/
# Optional appState seed as JSON
mateu.config={}
# Window form factor: desktop | mobile (mobile = phone-sized window to preview the responsive UI)
mateu.windowMode=desktop
