mateu.baseUrl=http://localhost:8592
mateu.route=/
mateu.config={}
# Focused mode: hide the IDE's own chrome (Project/Structure/Services/VCS tool windows, VCS toolbar
# widget) so the IDE is a clean shell for the app. Set to false to keep the full IDE.
mateu.focused=true
# App registry (production): the installable carries only these two coordinates; the registry
# entry supplies baseUrl + parameters and may require minimum plugin/IDE versions (see AppRegistry).
# Overridable with -Dmateu.registryUrl=… -Dmateu.appId=… (system properties win over this file).
#mateu.registryUrl=https://registry.example.com
#mateu.appId=demo-admin-panel
