<html lang="en">
  <head>
    <meta charset="UTF-8" />

      <!-- AQUIJS -->
    <link rel="stylesheet" href="./src/index.css" />
    <script type="module" src="./src/lumo.js"></script>
    <script type="module" src="./src/index.ts"></script>
      <!-- HASTAAQUIJS -->

  <body>
  <!-- AQUIUI -->
  <!--
  baseUrl="https://demo.mateu.io/fluent"
  baseUrl="/fluent"
  baseUrl="/declarative"
  baseUrl=""
  -->
  <mateu-ui baseUrl=""
            pathPrefix=""
            config='{"tenantId": "1111","profile": "dev"}'
            style="width: 100%; height: 100vh;"
  >
  </mateu-ui>
  <!-- HASTAAQUIUI -->

  <script>
    (function () {
      var saved = localStorage.getItem('mateu-theme');
      if (saved) {
        document.documentElement.setAttribute('theme', saved);
      } else if (window.matchMedia) {
        document.documentElement.setAttribute('theme',
          window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
          if (!localStorage.getItem('mateu-theme')) {
            document.documentElement.setAttribute('theme', e.matches ? 'dark' : 'light');
          }
        });
      }
    })();
  </script>

  </body>
</html>
