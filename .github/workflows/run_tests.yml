name: E2E Tests

on:
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: zulu

      - name: Build backend
        run: mvn -B install -DskipTests -Dgpg.skip=true --file backend/pom.xml

      - name: Build SUT apps
        run: mvn -B install -Dmaven.test.skip=true -Dgpg.skip=true --file e2e/sut/pom.xml

      - name: Start SUT apps
        run: |
          java -jar e2e/sut/apps/mvc-app1/target/mvc-app1-1.0.0-SNAPSHOT.jar      > /tmp/mvc-app1.log      2>&1 &
          java -jar e2e/sut/apps/webflux-app1/target/webflux-app1-1.0.0-SNAPSHOT.jar > /tmp/webflux-app1.log  2>&1 &
          java -jar e2e/sut/apps/quarkus-app1/target/quarkus-app1-1.0.0-SNAPSHOT-runner.jar > /tmp/quarkus-app1.log 2>&1 &
          java -jar e2e/sut/apps/micronaut-app1/target/micronaut-app1-1.0.0-SNAPSHOT.jar > /tmp/micronaut-app1.log 2>&1 &
          java -jar e2e/sut/apps/fed-remote-app/target/fed-remote-app-1.0.0-SNAPSHOT.jar > /tmp/fed-remote-app.log 2>&1 &
          java -jar e2e/sut/apps/fed-shell-app/target/fed-shell-app-1.0.0-SNAPSHOT.jar > /tmp/fed-shell-app.log 2>&1 &

      - name: Wait for SUT apps to be ready
        run: |
          for port in 8080 8081 8082 8083; do
            echo "Waiting for port $port..."
            until curl -sf http://localhost:$port/ > /dev/null; do sleep 2; done
            echo "Port $port is ready"
          done
          # the federation apps answer 404 on / — any HTTP response means they are up
          for port in 8084 8085; do
            echo "Waiting for port $port..."
            until curl -s -o /dev/null http://localhost:$port/; do sleep 2; done
            echo "Port $port is ready"
          done

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install npm dependencies
        run: cd e2e && npm ci

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: cd e2e && npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

