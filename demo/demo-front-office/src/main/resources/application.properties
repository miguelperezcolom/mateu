spring.application.name=demo-front-office
server.port=8594
mateu.debug=false

# In-memory H2 backing the front-office aggregates; schema.sql creates the tables,
# FrontOfficeSeeder populates them on startup.
# CASE_INSENSITIVE_IDENTIFIERS: Spring Data JDBC quotes derived identifiers in upper case
# ("GUEST") but explicit @Table values as-is ("guest_preference") — this makes both resolve.
spring.datasource.url=jdbc:h2:mem:frontoffice;DB_CLOSE_DELAY=-1;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.h2.console.enabled=true
